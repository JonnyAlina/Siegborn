workflows:
  ios_testflight:
    name: iOS TestFlight (No Mac)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      vars:
        BUNDLE_ID: com.example.crossPlatformApp

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Resolve iOS code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          flutter build ipa --release --build-number=$BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - notifications@crossplatformapp.dev
