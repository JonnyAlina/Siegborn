workflows:
  ios_testflight:
    name: iOS TestFlight (No Mac)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      vars:
        BUNDLE_ID: com.example.crossPlatformApp

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app

    publishing:
      email:
        recipients:
          - leonhart.jonathan@gmail.com
